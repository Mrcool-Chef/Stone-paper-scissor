<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Paper Scissor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
        <div class="head">
            <h1>Stone Paper Scissor</h1>
        </div>
        <div class="btn">
            <button class="func" id="stone">Stone</button>
            <button class="func" id="paper">Paper</button>
            <button class="func" id="scissor">Scissor</button>
        </div>
        <div class="win">
            <div class="headi">
                <h2 id="idk"></h2>
                <h1 class="reset">Reset</h1>
            </div>
        </div>
        <div class="score">
            <div class="player"><h2>Player score is :</h2>
            <h2 id="pscore">0</h2>
            </div>
            <div class="bot"><h2>Bot score is :</h2>
            <h2 id="bscore">0</h2>
        </div>
           
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
